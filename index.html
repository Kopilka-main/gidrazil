<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gidrazil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 30% 20%, #1e1b4b 0%, #0f172a 60%, #020617 100%);
      color: #e2e8f0;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 800;
      background: linear-gradient(135deg, #a5b4fc, #f0abfc, #fda4af);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    .tagline {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #94a3b8;
      max-width: 540px;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
    }
    .pulse {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
    footer {
      position: absolute;
      bottom: 24px;
      font-size: 13px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="logo">gidrazil</div>
  <p class="tagline">Сайт скоро здесь будет. Сейчас это пустая заглушка — на ней мы проверяем, что деплой работает.</p>
  <div class="status">
    <span class="pulse"></span>
    Сайт развёрнут и работает
  </div>
  <footer>built with ❤ &nbsp;&middot;&nbsp; <span id="year"></span></footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
